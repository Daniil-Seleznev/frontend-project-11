<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Aggregator</title>
</head>
<body>
  <div class="container py-5">
    <h1 class="mb-4">RSS агрегатор</h1>

    <form class="rss-form">
      <label class="form-label">Ссылка RSS</label>
    
      <input
        type="text"
        class="form-control"
        required
      />
    
      <button type="submit" class="btn btn-primary mt-2">
        Добавить
      </button>
    
      <div class="feedback text-danger mt-2"></div>
    </form>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
